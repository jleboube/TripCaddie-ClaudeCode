services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "47319:3000"
    env_file:
      - .secrets
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:47319}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tripcaddie
      - DB_USER=tripcaddie
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tripcaddie-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file:
      - .secrets
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tripcaddie
      - DB_USER=tripcaddie
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
    networks:
      - tripcaddie-network

  db:
    image: postgres:15-alpine
    env_file:
      - .secrets
    environment:
      - POSTGRES_DB=tripcaddie
      - POSTGRES_USER=tripcaddie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripcaddie -d tripcaddie"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - tripcaddie-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - tripcaddie-network

volumes:
  postgres_data:
  redis_data:

networks:
  tripcaddie-network:
    driver: bridge
